<!DOCTYPE html>
<html>
<head>
    <title>Nimansh Chourey - Resume</title>
    <style>
        body {
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center;
            background: linear-gradient(120deg, #000000, #444444, #aaaaaa);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* NAV BAR */
        nav { 
            background: rgba(0,0,0,0.65); 
            padding: 15px; 
            backdrop-filter: blur(6px);
        }
        nav a { 
            color: white; 
            margin-right: 20px; 
            text-decoration: none; 
            font-size: 16px;
            transition: 0.3s ease;
        }
        nav a:hover { 
            color: #00eaff;        
            transform: scale(1.07); 
        }
        /* MAIN CONTENT */
        .container { 
            padding: 40px; 
            max-width: 1000px; /* Slightly wider to fit side-by-side docs better */
            margin: 40px auto; 
            background: none;
            color: white;
        }
        h1 {
            font-size: 42px;
            margin-bottom: 30px;
            color: white;
        }
        /* PDF VIEWERS */
        .pdf-container {
            width: 100%;
            height: 575px;
            margin: 30px 0;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* BUTTONS */
        .resume-button {
            display: inline-block;
            background: rgba(0, 234, 255, 0.8);
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 8px;
            margin: 30px 0;
            transition: 0.3s ease;
            font-weight: bold;
        }
        .resume-button:hover {
            background: rgba(0, 234, 255, 1);
            transform: scale(1.05);
        }
        /* RECOMMENDATION SECTION LAYOUT */
        .recs-flex-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap; 
            margin-top: 20px;
        }
        .rec-column {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pdf-small {
            width: 100%;
            height: 400px; 
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .resume-button.small {
            padding: 10px 25px;
            font-size: 15px;
            margin: 10px 0 40px 0;
        }
        /* DIVIDER LINE */
        .divider {
            margin: 50px 0 30px 0;
            padding-top: 40px;
            border-top: 2px solid rgba(255,255,255,0.3);
        }
        h2 {
            font-size: 32px;
            color: white;
            margin-top: 0;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="internship.html">Internship</a>
    <a href="resume.html">Resume and Recommendations</a>
    <a href="projects.html">Projects</a>
    <a href="academics.html">Academics</a>
</nav>

<div class="container">
    <h1>Resume:</h1>
    
    <div class="pdf-container">
        <iframe src="https://docs.google.com/document/d/1hXYeb_u6jIdazeZyIIb6FBD_Qr5y05uPg6qkP0sD7HM/preview"></iframe>
    </div>
    
    <a href="https://docs.google.com/document/d/1hXYeb_u6jIdazeZyIIb6FBD_Qr5y05uPg6qkP0sD7HM/edit?usp=sharing" target="_blank" class="resume-button">Link to Resume</a>
    
    <div class="divider">
        <h2>Recommendations:</h2>
        
        <div class="recs-flex-wrapper">
            
            <div class="rec-column">
                <div class="pdf-small">
                    <iframe src="https://docs.google.com/document/d/YOUR_DOC_ID_1/preview"></iframe>
                </div>
                <a href="https://docs.google.com/document/d/YOUR_DOC_ID_1/edit?usp=sharing" target="_blank" class="resume-button small">Link to Recommendation 1</a>
            </div>

            <div class="rec-column">
                <div class="pdf-small">
                    <iframe src="https://docs.google.com/document/d/YOUR_DOC_ID_2/preview"></iframe>
                </div>
                <a href="https://docs.google.com/document/d/YOUR_DOC_ID_2/edit?usp=sharing" target="_blank" class="resume-button small">Link to Recommendation 2</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
